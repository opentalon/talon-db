syntax = "proto3";

package opentalon.talondb.v1;

option go_package = "github.com/opentalon/talon-db/proto/talondbpb";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

// TalonDBService is the wire surface exposed by `talondb-server`. The
// gRPC service maps 1:1 to the talondb.IndexedStore Go interface.
//
// Two transports speak this schema:
//   - gRPC, the primary protocol (Unix socket default, TCP optional).
//   - HTTP/JSON, generated by grpc-gateway from this file, useful for
//     curl-based debugging and non-Go clients. The HTTP paths follow
//     the Postgres-flavoured convention of operation-as-path, request
//     body as JSON.
service TalonDBService {
  // DocumentStore surface (entityID, docID) → bytes
  rpc Put(PutRequest) returns (google.protobuf.Empty);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);
  rpc BatchPut(BatchPutRequest) returns (google.protobuf.Empty);

  // IndexedStore lookup surface
  rpc Lookup(LookupRequest) returns (DocIDList);
  rpc LookupPrefix(LookupPrefixRequest) returns (DocIDList);
  rpc LookupNumericRange(NumericRangeRequest) returns (DocIDList);
  rpc WindowQuery(WindowRequest) returns (WindowResponse);
  rpc GroupCount(GroupRequest) returns (GroupResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc LastSeen(LastSeenRequest) returns (LastSeenResponse);
  rpc Ancestors(AncestorsRequest) returns (StringList);
  rpc Descendants(DescendantsRequest) returns (DocIDList);

  // Query is the server-side composer for structured queries: anchor
  // narrowing via the inverted index + per-doc clause evaluation. Lets
  // non-Go clients run a multi-clause query in one round-trip instead
  // of replicating the talon-language adapter's composition logic.
  // Supported clauses: Pattern, Predicate, Or, Not, FullText.
  rpc Query(QueryRequest) returns (QueryResponse);

  // SequenceJoin scans temporal indexes for one or more items and
  // returns the items whose event log contains the requested step
  // sequence in order, with total span at most window_nanos. Empty
  // item_ids means scan every item under entity_id.
  rpc SequenceJoin(SequenceJoinRequest) returns (SequenceJoinResponse);

  // ClusterQuery walks a (entity, itemID)'s temporal index and returns
  // non-overlapping clusters of events whose total span is at most
  // window_nanos and whose size is at least min_size. Replaces the
  // client-side "fetch all events + count" pattern for "N+ records
  // within W" detect blocks.
  rpc ClusterQuery(ClusterQueryRequest) returns (ClusterQueryResponse);

  // Vector index — per-scope HNSW with dimension locked on first
  // insert. talon-db hosts one logical index per (entity, scope), so a
  // single tenant can hold multiple embedding models with different
  // dimensions side-by-side without cross-contamination.
  rpc VectorInsert(VectorInsertRequest) returns (google.protobuf.Empty);
  rpc VectorSearch(VectorSearchRequest) returns (VectorSearchResponse);
  rpc VectorDelete(VectorDeleteRequest) returns (google.protobuf.Empty);
  rpc VectorDropScope(VectorDropScopeRequest) returns (google.protobuf.Empty);
  rpc VectorListScopes(VectorListScopesRequest) returns (VectorListScopesResponse);

  // Subscribe streams MutationEvents for every committed Put / Delete.
  // The server-side stream stays open until the client cancels or the
  // server shuts down. SubscribeRequest filters narrow the stream
  // server-side; an empty entity_id matches every tenant, an empty
  // doc_id_prefix matches every doc.
  rpc Subscribe(SubscribeRequest) returns (stream MutationEvent);

  // Operational
  rpc Health(google.protobuf.Empty) returns (HealthResponse);
}

// DocIDList is the canonical bag-of-doc-ids return shape. Clients are
// free to sort/dedupe locally; the server makes no ordering promise.
message DocIDList {
  repeated string doc_ids = 1;
}

message StringList {
  repeated string items = 1;
}

// ---------- DocumentStore ----------

message PutRequest {
  string entity_id = 1;
  string doc_id   = 2;
  bytes  doc      = 3;
}

message GetRequest {
  string entity_id = 1;
  string doc_id   = 2;
}

message GetResponse {
  bytes doc   = 1;
  bool  found = 2;
}

message DeleteRequest {
  string entity_id = 1;
  string doc_id   = 2;
}

message BatchPutEntry {
  string doc_id = 1;
  bytes  doc    = 2;
}

message BatchPutRequest {
  string                entity_id = 1;
  repeated BatchPutEntry entries  = 2;
}

// ---------- IndexedStore ----------

message LookupRequest {
  string entity_id = 1;
  string term     = 2;
}

message LookupPrefixRequest {
  string entity_id = 1;
  string prefix   = 2;
}

message NumericRangeRequest {
  string entity_id     = 1;
  string attr          = 2;
  double min           = 3;
  double max           = 4;
  bool   min_exclusive = 5;
  bool   max_exclusive = 6;
}

message WindowRequest {
  string          entity_id    = 1;
  string          item_id      = 2;
  repeated string types        = 3;
  int64           window_nanos = 4;
}

message TemporalEvent {
  string doc_id        = 1;
  string type          = 2;
  int64  at_unix_nanos = 3;
}

message WindowResponse {
  repeated TemporalEvent events = 1;
}

message GroupRequest {
  string entity_id = 1;
  string item_id  = 2;
  string attr     = 3;
  string value    = 4;
}

message GroupResponse {
  int64  count           = 1;
  int64  first_unix_nanos = 2;
  int64  last_unix_nanos  = 3;
  repeated string doc_ids = 4;
}

message StatsRequest {
  string entity_id = 1;
  string attr     = 2;
}

message StatsResponse {
  int64  count = 1;
  double mean  = 2;
  double m2    = 3;
  double min   = 4;
  double max   = 5;
}

message LastSeenRequest {
  string entity_id   = 1;
  string item_id     = 2;
  string record_type = 3;
}

message LastSeenResponse {
  int64 at_unix_nanos = 1;
  bool  found         = 2;
}

message AncestorsRequest {
  string entity_id   = 1;
  string category_id = 2;
}

message DescendantsRequest {
  string entity_id = 1;
  string root_id   = 2;
}

message HealthResponse {
  string status  = 1;
  string version = 2;
}

// ---------- Mutation events ----------

// MutationEventKind mirrors talon-language's factstore.EventKind so the
// adapter can map straight across.
enum MutationEventKind {
  MUTATION_EVENT_KIND_UNSPECIFIED = 0;
  MUTATION_EVENT_KIND_ASSERT      = 1;  // doc newly written (no prior version)
  MUTATION_EVENT_KIND_CHANGE      = 2;  // doc bytes changed; old_doc carries prior content
  MUTATION_EVENT_KIND_RETRACT     = 3;  // doc deleted; old_doc carries prior content
}

message SubscribeRequest {
  // entity_id, when non-empty, restricts the stream to one tenant.
  string entity_id     = 1;
  // doc_id_prefix, when non-empty, restricts the stream to docs whose
  // ID starts with this prefix. Combined with entity_id as AND.
  string doc_id_prefix = 2;
}

message MutationEvent {
  MutationEventKind kind          = 1;
  string            entity_id     = 2;
  string            doc_id        = 3;
  bytes             old_doc       = 4;  // empty on Assert; present on Change / Retract
  bytes             new_doc       = 5;  // empty on Retract; present on Assert / Change
  int64             at_unix_nanos = 6;
}

// ---------- Structured Query (RPC `Query`) ----------

message QueryRequest {
  string entity_id          = 1;
  repeated string find      = 2;  // variable names to project, e.g. ["?e", "?km"]
  repeated Clause where     = 3;
  repeated Aggregate aggregates = 4;  // when non-empty, response is aggregate rows
  repeated string group_by  = 5;      // variable names to bucket by
}

// Aggregate is one roll-up: count / sum / avg / min / max over the
// values bound to `over` across the match set. `as` names the column
// in the response row layout [group_by columns..., aggregate columns...].
message Aggregate {
  string fn   = 1;   // "count" | "sum" | "avg" | "min" | "max"
  Term   over = 2;   // variable whose binding gets aggregated
  string as   = 3;   // result column name (informational)
}
message QueryResponse {
  repeated QueryRow rows = 1;
}
message QueryRow {
  // One Value per Find column. Variables that didn't bind in this row
  // map to NULL (google.protobuf.NullValue).
  repeated google.protobuf.Value values = 1;
}

message Clause {
  oneof clause {
    Pattern   pattern   = 1;
    Predicate predicate = 2;
    Or        or        = 3;
    Not       not       = 4;
    FullText  fulltext  = 5;
  }
}

message Pattern {
  Term   entity    = 1;
  string attribute = 2;  // namespaced, e.g. ":record/type"; "" = wildcard
  Term   value     = 3;
}

message Predicate {
  // Op is one of: "<", "<=", ">", ">=", "==", "!=", "starts_with",
  // "ends_with", "contains". A string here (instead of an enum) keeps
  // the wire forward-compatible with future operators.
  string op    = 1;
  Term   left  = 2;
  Term   right = 3;
}

message Or {
  repeated ClauseList branches = 1;
}
message ClauseList {
  repeated Clause clauses = 1;
}

message Not {
  repeated Clause body = 1;
}

message FullText {
  Term   entity    = 1;
  string query     = 2;       // substring; case-insensitive
  string attribute = 3;       // "" = scan every string value on the entity
}

message Term {
  // Exactly one of var or literal should be set. An empty var with
  // null literal is the wildcard "any".
  string                var     = 1;
  google.protobuf.Value literal = 2;
}

message SequenceJoinRequest {
  string entity_id         = 1;
  repeated string steps    = 2;  // event type names in order (≥1)
  int64  window_nanos      = 3;  // 0 = no upper bound on span
  repeated string item_ids = 4;  // empty = scan every item under entity_id
}
message SequenceJoinResponse {
  repeated SequenceMatch matches = 1;
}
message SequenceMatch {
  string item_id                = 1;
  repeated TemporalEvent events = 2;  // exactly len(steps) events, in step order
}

message ClusterQueryRequest {
  string entity_id      = 1;
  string item_id        = 2;
  repeated string types = 3;  // empty = all types
  int64  window_nanos   = 4;  // 0 = no upper bound (one cluster per run)
  int32  min_size       = 5;  // ≥1 (1 yields every event as a singleton)
}
message ClusterQueryResponse {
  repeated TemporalCluster clusters = 1;
}
message TemporalCluster {
  int64  first_unix_nanos       = 1;
  int64  last_unix_nanos        = 2;
  repeated TemporalEvent events = 3;
}

// ---------- VectorIndex ----------

// VectorMetric mirrors the vectorindex.Metric enum. UNSPECIFIED defaults
// server-side to COSINE (matches most embedding models). The metric
// argument is honoured only on the first insert into a scope; later
// inserts keep the scope's original metric and ignore the field.
enum VectorMetric {
  VECTOR_METRIC_UNSPECIFIED = 0;
  VECTOR_METRIC_COSINE      = 1;
  VECTOR_METRIC_EUCLIDEAN   = 2;
}

message VectorInsertRequest {
  string         entity_id = 1;
  string         scope     = 2;  // identifies the embedding model / dimension
  string         id        = 3;
  repeated float vector    = 4;  // length sets dimension on first insert into scope
  VectorMetric   metric    = 5;  // honoured only on first insert into scope
}

message VectorSearchRequest {
  string         entity_id = 1;
  string         scope     = 2;
  repeated float vector    = 3;  // length must match the scope's locked dimension
  int32          k         = 4;
}

message VectorSearchResponse {
  repeated VectorHit hits = 1;  // ordered nearest-first
}

message VectorHit {
  string id       = 1;
  float  distance = 2;  // metric-dependent: lower = closer
}

message VectorDeleteRequest {
  string entity_id = 1;
  string scope     = 2;
  string id        = 3;
}

message VectorDropScopeRequest {
  string entity_id = 1;
  string scope     = 2;
}

message VectorListScopesRequest {
  string entity_id = 1;
}

message VectorListScopesResponse {
  repeated VectorScope scopes = 1;  // sorted by scope name
}

message VectorScope {
  string       scope  = 1;
  int32        dim    = 2;  // locked on first insert
  int32        count  = 3;  // live (non-tombstoned) vector count
  VectorMetric metric = 4;
}
